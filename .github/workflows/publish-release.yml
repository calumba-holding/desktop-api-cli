---
name: Publish Release
permissions:
  contents: write

concurrency:
  group: publish

on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Test
      run: npm test
    - name: Build Homebrew archive
      run: npm run pack:homebrew
    - name: Publish GitHub release assets
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        tag="${GITHUB_REF_NAME}"
        if ! gh release view "${tag}" >/dev/null 2>&1; then
          gh release create "${tag}" --title "${tag}" --generate-notes --verify-tag
        fi
        gh release upload "${tag}" dist/release/*.tar.gz dist/release/homebrew.json --clobber
    - name: Publish Homebrew formula
      env:
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      run: node scripts/publish-homebrew-formula.mjs
