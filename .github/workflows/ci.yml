name: CI
on:
  push:
    branches:
      - "**"
      - "!integrated/**"
      - "!stl-preview-head/**"
      - "!stl-preview-base/**"
      - "!generated"
      - "!codegen/**"
      - "codegen/stl/**"
  pull_request:
    branches-ignore:
      - "stl-preview-head/**"
      - "stl-preview-base/**"

jobs:
  test:
    timeout-minutes: 10
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Package Homebrew archive
        run: pnpm --filter beeper-cli run pack:homebrew
