name: CI
on:
  push:
    branches:
      - "**"
      - "!integrated/**"
      - "!stl-preview-head/**"
      - "!stl-preview-base/**"
      - "!generated"
      - "!codegen/**"
      - "codegen/stl/**"
  pull_request:
    branches-ignore:
      - "stl-preview-head/**"
      - "stl-preview-base/**"

jobs:
  test:
    timeout-minutes: 15
    name: test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  package:
    name: package homebrew archive
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Homebrew archive
        run: pnpm --filter beeper-cli run pack:homebrew
